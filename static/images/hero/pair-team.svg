<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 500" role="img" aria-label="Two trees side by side">
  <rect width="540" height="500" fill="#F4F6F1" rx="8"/>

  <!-- hills -->
  <path d="M0 385 Q130 365 270 375 T540 370 V500 H0 Z" fill="#C9D6C1" opacity="0.6"/>

  <!-- left tree (slightly taller) -->
  <g>
    <ellipse cx="180" cy="215" rx="90" ry="110" fill="#3F5A40"/>
    <ellipse cx="155" cy="195" rx="48" ry="58" fill="#4A6650" opacity="0.85"/>
    <ellipse cx="205" cy="200" rx="52" ry="62" fill="#547558" opacity="0.8"/>
    <rect x="174" y="315" width="12" height="100" fill="#2F4A30"/>
    <path d="M180 315 Q168 340 160 370" stroke="#2F4A30" stroke-width="2" fill="none" opacity="0.55"/>
    <path d="M180 315 Q192 340 200 370" stroke="#2F4A30" stroke-width="2" fill="none" opacity="0.55"/>
  </g>

  <!-- right tree (slightly shorter) -->
  <g>
    <ellipse cx="370" cy="240" rx="84" ry="98" fill="#3F5A40"/>
    <ellipse cx="345" cy="220" rx="44" ry="52" fill="#547558" opacity="0.85"/>
    <ellipse cx="395" cy="225" rx="48" ry="56" fill="#4A6650" opacity="0.8"/>
    <rect x="364" y="330" width="12" height="85" fill="#2F4A30"/>
    <path d="M370 330 Q358 350 350 378" stroke="#2F4A30" stroke-width="2" fill="none" opacity="0.55"/>
    <path d="M370 330 Q382 350 390 378" stroke="#2F4A30" stroke-width="2" fill="none" opacity="0.55"/>
  </g>

  <!-- ground line -->
  <line x1="0" y1="418" x2="540" y2="418" stroke="#2F4A30" stroke-width="1" opacity="0.35"/>
</svg>
