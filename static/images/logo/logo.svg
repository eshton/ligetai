<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 44" height="44" role="img" aria-label="AI Liget">
  <!-- Tree icon -->
  <g>
    <!-- trunk -->
    <path d="M20 22 L19 38 L25 38 L24 22 Z" fill="#2F4A30"/>
    <!-- subtle trunk center line -->
    <line x1="22" y1="23" x2="22" y2="37" stroke="#1F2A1F" stroke-width="0.35" opacity="0.45"/>

    <!-- canopy: back layer -->
    <ellipse cx="22" cy="15" rx="14" ry="13" fill="#3F5A40"/>
    <!-- canopy: side shadow -->
    <ellipse cx="15" cy="17" rx="6" ry="7" fill="#2F4A30" opacity="0.28"/>
    <!-- canopy: mid highlight -->
    <ellipse cx="27" cy="11" rx="7" ry="6" fill="#547558"/>
    <!-- canopy: top highlight -->
    <ellipse cx="18" cy="8" rx="5" ry="3.5" fill="#6A8D73"/>
    <!-- canopy: tiny crown -->
    <ellipse cx="24" cy="5" rx="3" ry="2" fill="#A3B9A3"/>

    <!-- grass blades at the base (left side) -->
    <g fill="#3F5A40">
      <path d="M4 38 C 5 35 5.5 33 6 30.5 C 6.5 33 7 35 8 38 Z"/>
      <path d="M9 38 C 9.5 36 10 34.5 10.5 33 C 11 34.5 11.5 36 12 38 Z"/>
      <path d="M13 38 C 13.3 36.5 13.6 35 14 34 C 14.4 35 14.7 36.5 15 38 Z"/>
    </g>
    <!-- grass blades (right side) -->
    <g fill="#4A6650">
      <path d="M29 38 C 29.3 36.5 29.6 35 30 34 C 30.4 35 30.7 36.5 31 38 Z"/>
      <path d="M32 38 C 32.5 36 33 34.5 33.5 33 C 34 34.5 34.5 36 35 38 Z"/>
      <path d="M36 38 C 37 35 37.5 33 38 30.5 C 38.5 33 39 35 40 38 Z"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="54" y="31" font-family="'Playfair Display', Georgia, serif" font-size="26" font-weight="700" fill="#3F5A40" letter-spacing="0.5">AI Liget</text>
</svg>
